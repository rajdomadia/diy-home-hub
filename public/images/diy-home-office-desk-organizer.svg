<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="woodSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Desk surface -->
  <rect x="100" y="420" width="1000" height="20" rx="4" fill="#D97706"/>
  <rect x="100" y="436" width="1000" height="8" fill="#92400E" rx="3"/>
  <!-- Main organizer body -->
  <g transform="translate(300, 140)">
    <!-- Back panel -->
    <rect x="0" y="0" width="600" height="280" rx="6" fill="url(#wood)"/>
    <!-- Base -->
    <rect x="0" y="270" width="600" height="15" rx="3" fill="#92400E"/>
    <!-- Top compartments (3 tall slots for pens/pencils) -->
    <!-- Left pen slot -->
    <rect x="15" y="15" width="80" height="160" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Pens in left slot -->
    <rect x="30" y="-20" width="8" height="190" rx="3" fill="#92400E"/>
    <rect x="42" y="-10" width="7" height="180" rx="3" fill="#D97706"/>
    <rect x="55" y="-15" width="7" height="185" rx="3" fill="#FCD34D"/>
    <rect x="68" y="-5" width="6" height="175" rx="3" fill="#B45309"/>
    <!-- Middle pen slot -->
    <rect x="105" y="15" width="80" height="160" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Pencils -->
    <rect x="120" y="-10" width="7" height="180" rx="3" fill="#FCD34D"/>
    <rect x="135" y="-25" width="6" height="195" rx="3" fill="#D97706"/>
    <rect x="148" y="-8" width="7" height="178" rx="3" fill="#92400E" opacity="0.7"/>
    <!-- Phone slot (wider, in middle) -->
    <rect x="200" y="15" width="120" height="170" rx="6" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Phone in slot -->
    <rect x="220" y="10" width="80" height="150" rx="10" fill="#374151"/>
    <rect x="225" y="18" width="70" height="130" rx="6" fill="#4B5563"/>
    <!-- Phone screen content -->
    <rect x="230" y="25" width="60" height="8" rx="2" fill="#D97706" opacity="0.5"/>
    <rect x="230" y="38" width="45" height="6" rx="2" fill="#FCD34D" opacity="0.4"/>
    <rect x="230" y="50" width="55" height="6" rx="2" fill="#FCD34D" opacity="0.3"/>
    <!-- Letter/paper holder (right) -->
    <rect x="335" y="15" width="120" height="160" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Papers/letters -->
    <rect x="345" y="-5" width="100" height="140" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="355" y="10" width="60" height="6" rx="2" fill="#D97706" opacity="0.4"/>
    <rect x="355" y="22" width="75" height="4" rx="2" fill="#9CA3AF" opacity="0.4"/>
    <rect x="355" y="32" width="65" height="4" rx="2" fill="#9CA3AF" opacity="0.3"/>
    <rect x="350" y="0" width="100" height="130" rx="3" fill="white" stroke="#E5E7EB" stroke-width="1" opacity="0.6" transform="rotate(3 400 60)"/>
    <!-- Small open shelf (top right) -->
    <rect x="470" y="15" width="115" height="75" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Items on shelf - tape, clips -->
    <circle cx="500" cy="65" r="18" fill="#FCD34D" stroke="#D97706" stroke-width="2"/>
    <circle cx="500" cy="65" r="8" fill="#FFFBEB"/>
    <rect x="535" y="55" width="30" height="20" rx="3" fill="#9CA3AF"/>
    <!-- Bottom drawers row -->
    <!-- Drawer 1 -->
    <rect x="15" y="190" width="185" height="70" rx="4" fill="#B45309" stroke="#92400E" stroke-width="2"/>
    <rect x="85" y="215" width="30" height="8" rx="4" fill="#FCD34D"/>
    <!-- Drawer 2 -->
    <rect x="210" y="190" width="185" height="70" rx="4" fill="#B45309" stroke="#92400E" stroke-width="2"/>
    <rect x="280" y="215" width="30" height="8" rx="4" fill="#FCD34D"/>
    <!-- Small compartment bottom right -->
    <rect x="405" y="190" width="180" height="70" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Sticky notes in compartment -->
    <rect x="415" y="200" width="40" height="40" fill="#FCD34D" transform="rotate(-5 435 220)"/>
    <rect x="460" y="200" width="40" height="40" fill="#FDE68A" transform="rotate(3 480 220)"/>
    <!-- Small shelf above bottom right -->
    <rect x="470" y="100" width="115" height="75" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
    <!-- Business cards -->
    <rect x="485" y="120" width="55" height="35" rx="2" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="490" y="128" width="30" height="4" rx="1" fill="#D97706" opacity="0.5"/>
    <rect x="490" y="136" width="40" height="3" rx="1" fill="#9CA3AF" opacity="0.4"/>
  </g>
  <!-- Shadow under organizer -->
  <ellipse cx="600" cy="430" rx="300" ry="8" fill="#92400E" opacity="0.1"/>
</svg>