<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="50%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg6)"/>

  <!-- Sky elements -->
  <circle cx="980" cy="100" r="45" fill="#FDE68A" opacity="0.3"/>

  <!-- Ground/garden bed -->
  <rect x="100" y="420" width="1000" height="160" rx="8" fill="url(#soilGrad)" opacity="0.6"/>
  <rect x="100" y="420" width="1000" height="15" rx="4" fill="#78350F" opacity="0.4"/>
  <!-- Soil texture dots -->
  <circle cx="200" cy="470" r="3" fill="#451A03" opacity="0.2"/>
  <circle cx="400" cy="490" r="3" fill="#451A03" opacity="0.2"/>
  <circle cx="600" cy="475" r="3" fill="#451A03" opacity="0.2"/>
  <circle cx="800" cy="485" r="3" fill="#451A03" opacity="0.2"/>
  <circle cx="1000" cy="470" r="3" fill="#451A03" opacity="0.2"/>

  <!-- Timer/water source unit (left side) -->
  <g transform="translate(140, 320)">
    <!-- Water faucet base -->
    <rect x="-25" y="-60" width="50" height="80" rx="6" fill="#78716C"/>
    <rect x="-20" y="-55" width="40" height="70" rx="4" fill="#A8A29E"/>
    <!-- Timer display -->
    <rect x="-14" y="-48" width="28" height="18" rx="3" fill="#065F46"/>
    <rect x="-10" y="-44" width="20" height="10" rx="2" fill="#6EE7B7" opacity="0.6"/>
    <!-- Timer knob -->
    <circle cx="0" cy="-15" r="8" fill="#78716C"/>
    <circle cx="0" cy="-15" r="5" fill="#A8A29E"/>
    <line x1="0" y1="-20" x2="0" y2="-15" stroke="#78716C" stroke-width="2"/>
    <!-- Buttons -->
    <circle cx="-8" cy="2" r="3" fill="#059669"/>
    <circle cx="8" cy="2" r="3" fill="#DC2626" opacity="0.7"/>
    <!-- Connection pipe going down -->
    <rect x="-5" y="20" width="10" height="80" rx="5" fill="#78716C"/>
  </g>

  <!-- Main drip line (horizontal tube) -->
  <line x1="145" y1="430" x2="1060" y2="430" stroke="#1C1917" stroke-width="8" stroke-linecap="round"/>
  <line x1="145" y1="428" x2="1060" y2="428" stroke="#44403C" stroke-width="4" stroke-linecap="round"/>
  <!-- Connector at start -->
  <rect x="138" y="422" width="20" height="16" rx="4" fill="#78716C"/>

  <!-- Drip emitters and plants -->
  <!-- Plant 1 - Tomato -->
  <g transform="translate(280, 420)">
    <!-- Drip emitter -->
    <rect x="-4" y="-2" width="8" height="8" rx="2" fill="#059669"/>
    <!-- Water drops -->
    <path d="M0 8 L0 30" stroke="#6EE7B7" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-2 28 C-2 24, 2 24, 2 28 C2 32, -2 32, -2 28Z" fill="#6EE7B7" opacity="0.7"/>
    <!-- Wet spot in soil -->
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#065F46" opacity="0.15"/>
    <!-- Tomato plant -->
    <line x1="0" y1="-5" x2="0" y2="-150" stroke="#059669" stroke-width="4"/>
    <!-- Branches -->
    <line x1="0" y1="-60" x2="-30" y2="-80" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="-90" x2="25" y2="-110" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="-120" x2="-25" y2="-135" stroke="#059669" stroke-width="2.5"/>
    <!-- Leaves -->
    <ellipse cx="-25" cy="-80" rx="18" ry="10" fill="#34D399" transform="rotate(-15, -25, -80)"/>
    <ellipse cx="-38" cy="-85" rx="15" ry="8" fill="#6EE7B7" transform="rotate(-30, -38, -85)"/>
    <ellipse cx="25" cy="-110" rx="18" ry="10" fill="#059669" transform="rotate(15, 25, -110)"/>
    <ellipse cx="38" cy="-115" rx="15" ry="8" fill="#34D399" transform="rotate(25, 38, -115)"/>
    <ellipse cx="-25" cy="-135" rx="16" ry="9" fill="#6EE7B7" transform="rotate(-20, -25, -135)"/>
    <ellipse cx="10" cy="-148" rx="14" ry="8" fill="#34D399" transform="rotate(10, 10, -148)"/>
    <ellipse cx="-10" cy="-152" rx="12" ry="7" fill="#059669"/>
    <!-- Tomatoes -->
    <circle cx="20" cy="-65" r="10" fill="#EF4444" opacity="0.85"/>
    <circle cx="15" cy="-60" r="8" fill="#DC2626" opacity="0.8"/>
    <circle cx="-18" cy="-100" r="8" fill="#F87171" opacity="0.7"/>
  </g>

  <!-- Plant 2 - Pepper -->
  <g transform="translate(460, 420)">
    <rect x="-4" y="-2" width="8" height="8" rx="2" fill="#059669"/>
    <path d="M0 8 L0 30" stroke="#6EE7B7" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-2 28 C-2 24, 2 24, 2 28 C2 32, -2 32, -2 28Z" fill="#6EE7B7" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#065F46" opacity="0.15"/>
    <!-- Pepper plant -->
    <line x1="0" y1="-5" x2="0" y2="-120" stroke="#059669" stroke-width="3.5"/>
    <line x1="0" y1="-50" x2="-25" y2="-70" stroke="#059669" stroke-width="2"/>
    <line x1="0" y1="-80" x2="20" y2="-95" stroke="#059669" stroke-width="2"/>
    <ellipse cx="-22" cy="-72" rx="16" ry="9" fill="#34D399" transform="rotate(-20, -22, -72)"/>
    <ellipse cx="-32" cy="-68" rx="13" ry="8" fill="#6EE7B7" transform="rotate(-35, -32, -68)"/>
    <ellipse cx="20" cy="-97" rx="15" ry="9" fill="#059669" transform="rotate(15, 20, -97)"/>
    <ellipse cx="30" cy="-92" rx="12" ry="7" fill="#34D399" transform="rotate(30, 30, -92)"/>
    <ellipse cx="5" cy="-122" rx="14" ry="8" fill="#6EE7B7"/>
    <ellipse cx="-8" cy="-118" rx="12" ry="7" fill="#34D399"/>
    <!-- Pepper fruit -->
    <path d="M-15 -55 C-18 -50, -16 -42, -12 -40 C-8 -42, -6 -50, -9 -55Z" fill="#059669" opacity="0.8"/>
  </g>

  <!-- Plant 3 - Lettuce/leafy -->
  <g transform="translate(640, 420)">
    <rect x="-4" y="-2" width="8" height="8" rx="2" fill="#059669"/>
    <path d="M0 8 L0 30" stroke="#6EE7B7" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-2 28 C-2 24, 2 24, 2 28 C2 32, -2 32, -2 28Z" fill="#6EE7B7" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#065F46" opacity="0.15"/>
    <!-- Lettuce -->
    <ellipse cx="0" cy="-30" rx="30" ry="18" fill="#34D399"/>
    <ellipse cx="-15" cy="-40" rx="22" ry="16" fill="#6EE7B7"/>
    <ellipse cx="15" cy="-42" rx="20" ry="15" fill="#059669"/>
    <ellipse cx="0" cy="-50" rx="18" ry="14" fill="#A7F3D0"/>
    <ellipse cx="-8" cy="-55" rx="15" ry="12" fill="#6EE7B7"/>
    <ellipse cx="8" cy="-58" rx="14" ry="11" fill="#34D399"/>
    <ellipse cx="0" cy="-62" rx="12" ry="10" fill="#D1FAE5"/>
  </g>

  <!-- Plant 4 - Herb -->
  <g transform="translate(820, 420)">
    <rect x="-4" y="-2" width="8" height="8" rx="2" fill="#059669"/>
    <path d="M0 8 L0 30" stroke="#6EE7B7" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-2 28 C-2 24, 2 24, 2 28 C2 32, -2 32, -2 28Z" fill="#6EE7B7" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#065F46" opacity="0.15"/>
    <!-- Herb plant -->
    <line x1="0" y1="-5" x2="0" y2="-100" stroke="#059669" stroke-width="3"/>
    <line x1="-8" y1="-5" x2="-12" y2="-85" stroke="#047857" stroke-width="2"/>
    <line x1="8" y1="-5" x2="12" y2="-80" stroke="#047857" stroke-width="2"/>
    <ellipse cx="-15" cy="-50" rx="12" ry="7" fill="#6EE7B7" transform="rotate(-25, -15, -50)"/>
    <ellipse cx="15" cy="-55" rx="12" ry="7" fill="#34D399" transform="rotate(25, 15, -55)"/>
    <ellipse cx="-12" cy="-70" rx="10" ry="6" fill="#34D399" transform="rotate(-15, -12, -70)"/>
    <ellipse cx="12" cy="-75" rx="10" ry="6" fill="#6EE7B7" transform="rotate(20, 12, -75)"/>
    <ellipse cx="0" cy="-98" rx="9" ry="6" fill="#059669"/>
    <ellipse cx="-8" cy="-88" rx="8" ry="5" fill="#6EE7B7" transform="rotate(-10, -8, -88)"/>
    <ellipse cx="8" cy="-84" rx="8" ry="5" fill="#34D399" transform="rotate(10, 8, -84)"/>
  </g>

  <!-- Plant 5 - Small seedling -->
  <g transform="translate(980, 420)">
    <rect x="-4" y="-2" width="8" height="8" rx="2" fill="#059669"/>
    <path d="M0 8 L0 30" stroke="#6EE7B7" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="M-2 28 C-2 24, 2 24, 2 28 C2 32, -2 32, -2 28Z" fill="#6EE7B7" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#065F46" opacity="0.15"/>
    <!-- Small seedling -->
    <line x1="0" y1="-5" x2="0" y2="-50" stroke="#059669" stroke-width="2.5"/>
    <ellipse cx="-10" cy="-35" rx="12" ry="7" fill="#6EE7B7" transform="rotate(-20, -10, -35)"/>
    <ellipse cx="10" cy="-40" rx="12" ry="7" fill="#34D399" transform="rotate(20, 10, -40)"/>
    <ellipse cx="0" cy="-50" rx="9" ry="6" fill="#059669"/>
  </g>

  <!-- Mulch layer indication -->
  <g opacity="0.3">
    <ellipse cx="350" cy="432" rx="30" ry="4" fill="#92400E"/>
    <ellipse cx="550" cy="434" rx="25" ry="3" fill="#78350F"/>
    <ellipse cx="730" cy="432" rx="28" ry="4" fill="#92400E"/>
    <ellipse cx="900" cy="434" rx="22" ry="3" fill="#78350F"/>
  </g>

  <!-- End cap on drip line -->
  <circle cx="1060" cy="430" r="6" fill="#44403C"/>
  <circle cx="1060" cy="430" r="3" fill="#78716C"/>
</svg>