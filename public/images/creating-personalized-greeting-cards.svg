<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="40%" stop-color="#FFE4E6"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4E6"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <linearGradient id="envelope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDA4AF"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="envelopeFlap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#FDA4AF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="4" stdDeviation="6" flood-color="#9F1239" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmall" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#9F1239" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative dots -->
  <circle cx="150" cy="100" r="6" fill="#FDA4AF" opacity="0.4"/>
  <circle cx="180" cy="140" r="4" fill="#F43F5E" opacity="0.3"/>
  <circle cx="130" cy="160" r="5" fill="#FECDD3" opacity="0.5"/>
  <circle cx="1050" cy="80" r="5" fill="#FDA4AF" opacity="0.3"/>
  <circle cx="1080" cy="120" r="4" fill="#F43F5E" opacity="0.25"/>
  <circle cx="1020" cy="130" r="6" fill="#FECDD3" opacity="0.4"/>
  <circle cx="200" cy="500" r="5" fill="#F43F5E" opacity="0.2"/>
  <circle cx="1000" cy="520" r="7" fill="#FDA4AF" opacity="0.3"/>
  <!-- Small decorative stars -->
  <path d="M250 200 l3 8 8 0 -6 5 2 8 -7-4 -7 4 2-8 -6-5 8 0z" fill="#F43F5E" opacity="0.2"/>
  <path d="M950 400 l3 8 8 0 -6 5 2 8 -7-4 -7 4 2-8 -6-5 8 0z" fill="#FDA4AF" opacity="0.25"/>
  <!-- Back card (slightly rotated, behind) -->
  <g transform="translate(600, 300) rotate(-8)" filter="url(#shadow)">
    <rect x="-160" y="-200" width="320" height="420" rx="8" fill="url(#card2)"/>
    <!-- Decorative border on back card -->
    <rect x="-140" y="-180" width="280" height="380" rx="5" fill="none" stroke="#FDA4AF" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
    <!-- Small flower decoration -->
    <circle cx="0" cy="-80" r="15" fill="#F43F5E" opacity="0.3"/>
    <circle cx="-12" cy="-68" r="12" fill="#FDA4AF" opacity="0.3"/>
    <circle cx="12" cy="-68" r="12" fill="#FB7185" opacity="0.3"/>
  </g>
  <!-- Middle card (slightly rotated other way) -->
  <g transform="translate(550, 280) rotate(5)" filter="url(#shadow)">
    <rect x="-160" y="-200" width="320" height="420" rx="8" fill="#FFFFFF"/>
    <!-- Simple line decorations -->
    <line x1="-100" y1="-100" x2="100" y2="-100" stroke="#FFE4E6" stroke-width="2"/>
    <line x1="-80" y1="-80" x2="80" y2="-80" stroke="#FECDD3" stroke-width="1.5"/>
    <line x1="-100" y1="100" x2="100" y2="100" stroke="#FFE4E6" stroke-width="2"/>
    <line x1="-80" y1="120" x2="80" y2="120" stroke="#FECDD3" stroke-width="1.5"/>
  </g>
  <!-- Front card (open, showing heart) -->
  <g transform="translate(650, 310)" filter="url(#shadow)">
    <!-- Card body -->
    <rect x="-170" y="-210" width="340" height="440" rx="8" fill="url(#card1)"/>
    <!-- Subtle border -->
    <rect x="-155" y="-195" width="310" height="410" rx="6" fill="none" stroke="#FECDD3" stroke-width="1.5"/>
    <!-- Heart in center -->
    <path d="M0 -30 C0 -30 -60 -90 -60 -55 C-60 -20 -30 10 0 45 C30 10 60 -20 60 -55 C60 -90 0 -30 0 -30Z" fill="#F43F5E" opacity="0.85"/>
    <!-- Heart shine -->
    <ellipse cx="-20" cy="-50" rx="12" ry="8" fill="#FDA4AF" opacity="0.5" transform="rotate(-20, -20, -50)"/>
    <!-- Small decorative dots around heart -->
    <circle cx="-80" cy="-10" r="4" fill="#FDA4AF" opacity="0.4"/>
    <circle cx="80" cy="-10" r="4" fill="#FDA4AF" opacity="0.4"/>
    <circle cx="-60" cy="50" r="3" fill="#FECDD3" opacity="0.5"/>
    <circle cx="60" cy="50" r="3" fill="#FECDD3" opacity="0.5"/>
    <circle cx="0" cy="-100" r="3.5" fill="#F43F5E" opacity="0.3"/>
  </g>
  <!-- Envelope (bottom left area) -->
  <g transform="translate(380, 420) rotate(-12)" filter="url(#shadowSmall)">
    <!-- Envelope body -->
    <rect x="-130" y="-75" width="260" height="160" rx="5" fill="url(#envelope)"/>
    <!-- Envelope flap -->
    <polygon points="-130,-75 0,30 130,-75" fill="url(#envelopeFlap)" opacity="0.9"/>
    <!-- Envelope seal -->
    <circle cx="0" cy="-10" r="18" fill="#9F1239" opacity="0.6"/>
    <circle cx="0" cy="-10" r="12" fill="#F43F5E" opacity="0.4"/>
    <!-- Envelope lines -->
    <line x1="-90" y1="20" x2="90" y2="20" stroke="#FB7185" stroke-width="1" opacity="0.3"/>
    <line x1="-70" y1="40" x2="70" y2="40" stroke="#FB7185" stroke-width="1" opacity="0.3"/>
    <line x1="-50" y1="60" x2="50" y2="60" stroke="#FB7185" stroke-width="1" opacity="0.3"/>
  </g>
</svg>