<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="adhesive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Wall section -->
  <rect x="200" y="60" width="800" height="420" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="2" rx="4"/>
  <!-- Counter top at bottom -->
  <rect x="180" y="430" width="840" height="25" rx="4" fill="#D97706"/>
  <rect x="180" y="450" width="840" height="10" fill="#92400E" rx="3"/>
  <!-- Cabinet top edge -->
  <rect x="200" y="55" width="800" height="12" rx="4" fill="#92400E"/>
  <!-- Installed subway tiles (left portion) -->
  <g>
    <!-- Row 1 -->
    <rect x="210" y="75" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="325" y="75" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="440" y="75" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="555" y="75" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <!-- Row 2 (offset) -->
    <rect x="210" y="135" width="55" height="55" rx="2" fill="#D97706" opacity="0.5" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="270" y="135" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="385" y="135" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="500" y="135" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <!-- Row 3 -->
    <rect x="210" y="195" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="325" y="195" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="440" y="195" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="555" y="195" width="60" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <!-- Row 4 (offset) -->
    <rect x="210" y="255" width="55" height="55" rx="2" fill="#D97706" opacity="0.5" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="270" y="255" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="385" y="255" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="500" y="255" width="60" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <!-- Row 5 -->
    <rect x="210" y="315" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="325" y="315" width="110" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="440" y="315" width="60" height="55" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <!-- Row 6 (offset) -->
    <rect x="210" y="375" width="55" height="50" rx="2" fill="#D97706" opacity="0.5" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="270" y="375" width="110" height="50" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
    <rect x="385" y="375" width="80" height="50" rx="2" fill="#FCD34D" stroke="#FFFBEB" stroke-width="3"/>
  </g>
  <!-- Adhesive area (where next tile goes) -->
  <g>
    <!-- Trowel marks in adhesive -->
    <rect x="580" y="195" width="200" height="120" fill="url(#adhesive)" rx="2"/>
    <!-- Notched adhesive pattern -->
    <line x1="590" y1="210" x2="770" y2="210" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="225" x2="770" y2="225" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="240" x2="770" y2="240" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="255" x2="770" y2="255" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="270" x2="770" y2="270" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="285" x2="770" y2="285" stroke="#9CA3AF" stroke-width="3"/>
    <line x1="590" y1="300" x2="770" y2="300" stroke="#9CA3AF" stroke-width="3"/>
  </g>
  <!-- Tile being placed (slightly angled, in transit) -->
  <rect x="650" y="140" width="110" height="55" rx="2" fill="#FCD34D" stroke="#D97706" stroke-width="2" transform="rotate(-8 705 167)" opacity="0.9"/>
  <!-- Trowel -->
  <g transform="translate(830, 240)">
    <!-- Blade -->
    <rect x="0" y="0" width="120" height="70" rx="3" fill="#9CA3AF" stroke="#6B7280" stroke-width="2"/>
    <!-- Notched edge -->
    <path d="M120 0 L125 10 L120 20 L125 30 L120 40 L125 50 L120 60 L125 70 L120 70 L120 0" fill="#6B7280"/>
    <!-- Handle mount -->
    <rect x="-10" y="20" width="20" height="30" rx="4" fill="#6B7280"/>
    <!-- Handle -->
    <rect x="-50" y="15" width="50" height="40" rx="8" fill="#92400E"/>
    <rect x="-45" y="20" width="40" height="30" rx="6" fill="#D97706" opacity="0.5"/>
    <!-- Adhesive on trowel -->
    <rect x="30" y="5" width="85" height="60" rx="2" fill="#D1D5DB" opacity="0.6"/>
  </g>
  <!-- Spacers -->
  <rect x="548" y="190" width="8" height="12" fill="#D97706" rx="1"/>
  <rect x="548" y="250" width="8" height="12" fill="#D97706" rx="1"/>
  <!-- Floor -->
  <rect x="0" y="460" width="1200" height="170" fill="#92400E" opacity="0.1"/>
</svg>