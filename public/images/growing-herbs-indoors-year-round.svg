<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC8A60"/>
      <stop offset="100%" stop-color="#B45B35"/>
    </linearGradient>
  </defs>
  <!-- Background (indoor wall) -->
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Window frame -->
  <rect x="220" y="60" width="760" height="420" rx="8" fill="#78716C"/>
  <rect x="230" y="70" width="740" height="400" rx="4" fill="url(#sky)"/>

  <!-- Window panes dividers -->
  <rect x="595" y="70" width="10" height="400" fill="#78716C"/>
  <rect x="230" y="265" width="740" height="10" fill="#78716C"/>

  <!-- Sun through window -->
  <circle cx="800" cy="150" r="50" fill="#FCD34D" opacity="0.4"/>
  <circle cx="800" cy="150" r="35" fill="#FDE68A" opacity="0.5"/>

  <!-- Clouds -->
  <g opacity="0.5">
    <ellipse cx="380" cy="140" rx="50" ry="20" fill="white"/>
    <ellipse cx="410" cy="130" rx="40" ry="18" fill="white"/>
    <ellipse cx="360" cy="135" rx="35" ry="16" fill="white"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="700" cy="200" rx="40" ry="15" fill="white"/>
    <ellipse cx="725" cy="192" rx="30" ry="13" fill="white"/>
  </g>

  <!-- Windowsill -->
  <rect x="190" y="470" width="820" height="30" rx="4" fill="#A8A29E"/>
  <rect x="195" y="472" width="810" height="12" rx="3" fill="#D6D3D1"/>
  <rect x="190" y="495" width="820" height="8" rx="3" fill="#78716C"/>

  <!-- Pot 1 - Basil (large bushy) -->
  <g transform="translate(340, 470)">
    <!-- Pot -->
    <path d="M-35 0 L-42 65 C-42 72, 42 72, 42 65 L35 0Z" fill="url(#terra)"/>
    <rect x="-44" y="-5" width="88" height="12" rx="4" fill="#DC8A60"/>
    <ellipse cx="0" cy="67" rx="40" ry="5" fill="#92400E" opacity="0.3"/>
    <!-- Soil -->
    <ellipse cx="0" cy="0" rx="33" ry="6" fill="#78350F" opacity="0.6"/>
    <!-- Basil leaves -->
    <line x1="0" y1="-5" x2="0" y2="-80" stroke="#059669" stroke-width="3"/>
    <line x1="-10" y1="-5" x2="-15" y2="-60" stroke="#059669" stroke-width="2"/>
    <line x1="10" y1="-5" x2="15" y2="-65" stroke="#059669" stroke-width="2"/>
    <!-- Basil leaf pairs -->
    <ellipse cx="-18" cy="-50" rx="16" ry="10" fill="#34D399" transform="rotate(-20, -18, -50)"/>
    <ellipse cx="18" cy="-50" rx="16" ry="10" fill="#34D399" transform="rotate(20, 18, -50)"/>
    <ellipse cx="-14" cy="-65" rx="14" ry="9" fill="#059669" transform="rotate(-15, -14, -65)"/>
    <ellipse cx="14" cy="-65" rx="14" ry="9" fill="#059669" transform="rotate(15, 14, -65)"/>
    <ellipse cx="-10" cy="-78" rx="12" ry="8" fill="#6EE7B7" transform="rotate(-10, -10, -78)"/>
    <ellipse cx="10" cy="-78" rx="12" ry="8" fill="#6EE7B7" transform="rotate(10, 10, -78)"/>
    <ellipse cx="0" cy="-88" rx="10" ry="7" fill="#34D399"/>
    <ellipse cx="-22" cy="-38" rx="13" ry="8" fill="#6EE7B7" transform="rotate(-25, -22, -38)"/>
    <ellipse cx="22" cy="-38" rx="13" ry="8" fill="#6EE7B7" transform="rotate(25, 22, -38)"/>
  </g>

  <!-- Pot 2 - Rosemary (tall, needle-like) -->
  <g transform="translate(530, 470)">
    <!-- Pot -->
    <path d="M-30 0 L-36 58 C-36 64, 36 64, 36 58 L30 0Z" fill="url(#terra)"/>
    <rect x="-38" y="-5" width="76" height="11" rx="4" fill="#DC8A60"/>
    <ellipse cx="0" cy="60" rx="34" ry="4" fill="#92400E" opacity="0.3"/>
    <!-- Soil -->
    <ellipse cx="0" cy="0" rx="28" ry="5" fill="#78350F" opacity="0.6"/>
    <!-- Rosemary stems -->
    <line x1="-5" y1="-5" x2="-12" y2="-100" stroke="#065F46" stroke-width="3"/>
    <line x1="5" y1="-5" x2="10" y2="-90" stroke="#065F46" stroke-width="2.5"/>
    <line x1="0" y1="-5" x2="2" y2="-95" stroke="#065F46" stroke-width="2"/>
    <!-- Rosemary needles (small elongated leaves) -->
    <!-- Left branch -->
    <ellipse cx="-16" cy="-40" rx="3" ry="8" fill="#059669" transform="rotate(-20, -16, -40)"/>
    <ellipse cx="-10" cy="-42" rx="3" ry="8" fill="#34D399" transform="rotate(15, -10, -42)"/>
    <ellipse cx="-17" cy="-55" rx="3" ry="7" fill="#059669" transform="rotate(-25, -17, -55)"/>
    <ellipse cx="-11" cy="-57" rx="3" ry="7" fill="#34D399" transform="rotate(10, -11, -57)"/>
    <ellipse cx="-18" cy="-70" rx="3" ry="7" fill="#6EE7B7" transform="rotate(-15, -18, -70)"/>
    <ellipse cx="-12" cy="-72" rx="3" ry="7" fill="#059669" transform="rotate(20, -12, -72)"/>
    <ellipse cx="-16" cy="-85" rx="3" ry="6" fill="#34D399" transform="rotate(-10, -16, -85)"/>
    <ellipse cx="-10" cy="-88" rx="3" ry="6" fill="#6EE7B7" transform="rotate(15, -10, -88)"/>
    <ellipse cx="-14" cy="-95" rx="2" ry="5" fill="#059669" transform="rotate(-5, -14, -95)"/>
    <!-- Right branch -->
    <ellipse cx="14" cy="-38" rx="3" ry="8" fill="#34D399" transform="rotate(20, 14, -38)"/>
    <ellipse cx="8" cy="-40" rx="3" ry="8" fill="#059669" transform="rotate(-15, 8, -40)"/>
    <ellipse cx="15" cy="-52" rx="3" ry="7" fill="#059669" transform="rotate(25, 15, -52)"/>
    <ellipse cx="9" cy="-55" rx="3" ry="7" fill="#6EE7B7" transform="rotate(-10, 9, -55)"/>
    <ellipse cx="14" cy="-66" rx="3" ry="7" fill="#34D399" transform="rotate(15, 14, -66)"/>
    <ellipse cx="8" cy="-69" rx="3" ry="7" fill="#059669" transform="rotate(-20, 8, -69)"/>
    <ellipse cx="12" cy="-80" rx="3" ry="6" fill="#6EE7B7" transform="rotate(10, 12, -80)"/>
    <ellipse cx="10" cy="-88" rx="2" ry="5" fill="#34D399" transform="rotate(-5, 10, -88)"/>
  </g>

  <!-- Pot 3 - Mint (spreading, round leaves) -->
  <g transform="translate(710, 470)">
    <!-- Pot -->
    <path d="M-32 0 L-38 60 C-38 67, 38 67, 38 60 L32 0Z" fill="url(#terra)"/>
    <rect x="-40" y="-5" width="80" height="11" rx="4" fill="#DC8A60"/>
    <ellipse cx="0" cy="62" rx="36" ry="4" fill="#92400E" opacity="0.3"/>
    <!-- Soil -->
    <ellipse cx="0" cy="0" rx="30" ry="5" fill="#78350F" opacity="0.6"/>
    <!-- Mint stems and leaves -->
    <line x1="-8" y1="-5" x2="-15" y2="-60" stroke="#059669" stroke-width="2.5"/>
    <line x1="8" y1="-5" x2="12" y2="-55" stroke="#059669" stroke-width="2.5"/>
    <line x1="0" y1="-5" x2="-2" y2="-70" stroke="#059669" stroke-width="2"/>
    <!-- Spreading branch -->
    <path d="M-15 -40 C-30 -45, -35 -35, -40 -40" stroke="#059669" stroke-width="2" fill="none"/>
    <path d="M12 -35 C25 -38, 30 -30, 38 -35" stroke="#059669" stroke-width="2" fill="none"/>
    <!-- Mint round leaves -->
    <circle cx="-20" cy="-55" r="10" fill="#34D399"/>
    <circle cx="-10" cy="-62" r="9" fill="#6EE7B7"/>
    <circle cx="15" cy="-50" r="10" fill="#059669"/>
    <circle cx="8" cy="-58" r="9" fill="#34D399"/>
    <circle cx="-5" cy="-72" r="8" fill="#6EE7B7"/>
    <circle cx="3" cy="-68" r="8" fill="#34D399"/>
    <circle cx="-38" cy="-42" r="8" fill="#6EE7B7"/>
    <circle cx="-30" cy="-48" r="7" fill="#34D399"/>
    <circle cx="36" cy="-37" r="8" fill="#059669"/>
    <circle cx="28" cy="-42" r="7" fill="#6EE7B7"/>
    <!-- Leaf veins -->
    <line x1="-20" y1="-60" x2="-20" y2="-50" stroke="#047857" stroke-width="0.8" opacity="0.4"/>
    <line x1="15" y1="-55" x2="15" y2="-45" stroke="#047857" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Pot 4 - Chives (thin upright) -->
  <g transform="translate(880, 470)">
    <!-- Pot (smaller) -->
    <path d="M-25 0 L-30 50 C-30 56, 30 56, 30 50 L25 0Z" fill="url(#terra)"/>
    <rect x="-32" y="-5" width="64" height="10" rx="4" fill="#DC8A60"/>
    <ellipse cx="0" cy="52" rx="28" ry="4" fill="#92400E" opacity="0.3"/>
    <!-- Soil -->
    <ellipse cx="0" cy="0" rx="23" ry="4" fill="#78350F" opacity="0.6"/>
    <!-- Chive blades -->
    <line x1="-10" y1="-5" x2="-14" y2="-80" stroke="#059669" stroke-width="2.5"/>
    <line x1="-5" y1="-5" x2="-3" y2="-85" stroke="#34D399" stroke-width="2"/>
    <line x1="0" y1="-5" x2="2" y2="-90" stroke="#059669" stroke-width="2.5"/>
    <line x1="5" y1="-5" x2="8" y2="-82" stroke="#34D399" stroke-width="2"/>
    <line x1="10" y1="-5" x2="14" y2="-75" stroke="#059669" stroke-width="2.5"/>
    <line x1="-15" y1="-5" x2="-18" y2="-70" stroke="#6EE7B7" stroke-width="2"/>
    <line x1="15" y1="-5" x2="18" y2="-68" stroke="#6EE7B7" stroke-width="2"/>
    <!-- Chive flower -->
    <circle cx="2" cy="-93" r="7" fill="#D8B4FE" opacity="0.8"/>
    <circle cx="-3" cy="-88" r="6" fill="#C4B5FD" opacity="0.7"/>
  </g>

  <!-- Sunlight rays from window -->
  <line x1="800" y1="150" x2="750" y2="470" stroke="#FDE68A" stroke-width="2" opacity="0.15"/>
  <line x1="800" y1="150" x2="650" y2="470" stroke="#FDE68A" stroke-width="2" opacity="0.12"/>
  <line x1="800" y1="150" x2="850" y2="470" stroke="#FDE68A" stroke-width="2" opacity="0.12"/>

  <!-- Small watering can on sill -->
  <g transform="translate(240, 458)">
    <ellipse cx="0" cy="12" rx="18" ry="14" fill="#6EE7B7"/>
    <rect x="-16" y="0" width="32" height="14" rx="6" fill="#34D399"/>
    <rect x="14" y="2" width="20" height="3" rx="1.5" fill="#34D399"/>
    <circle cx="34" cy="3.5" r="2" fill="#34D399"/>
    <path d="M-8 0 C-8 -8, 8 -8, 8 0" stroke="#34D399" stroke-width="3" fill="none"/>
  </g>
</svg>