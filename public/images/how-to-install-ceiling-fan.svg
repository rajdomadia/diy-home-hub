<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="motor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="80" fill="#FCD34D" opacity="0.3"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#D97706" stroke-width="1" opacity="0.3"/>
  <!-- Ceiling mount / canopy -->
  <g transform="translate(600, 80)">
    <!-- Canopy (ceiling plate) -->
    <ellipse cx="0" cy="0" rx="50" ry="12" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2"/>
    <!-- Down rod -->
    <rect x="-6" y="10" width="12" height="80" fill="url(#motor)" stroke="#9CA3AF" stroke-width="1"/>
  </g>
  <!-- Fan motor housing -->
  <g transform="translate(600, 170)">
    <!-- Motor body -->
    <ellipse cx="0" cy="15" rx="60" ry="30" fill="url(#motor)" stroke="#9CA3AF" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="60" ry="15" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Motor bottom cap -->
    <ellipse cx="0" cy="30" rx="55" ry="12" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  </g>
  <!-- Fan blades (4 blades, viewed from below at slight angle) -->
  <!-- Blade 1 - Right -->
  <g transform="translate(600, 195)">
    <path d="M60 0 L320 -35 Q340 -32 340 -20 L340 0 Q340 12 320 15 L60 15 Z" fill="url(#blade)" opacity="0.9"/>
    <!-- Wood grain -->
    <line x1="80" y1="3" x2="300" y2="-20" stroke="#92400E" stroke-width="0.5" opacity="0.4"/>
    <line x1="80" y1="10" x2="300" y2="-8" stroke="#92400E" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Blade 2 - Left -->
  <g transform="translate(600, 195)">
    <path d="M-60 0 L-320 -35 Q-340 -32 -340 -20 L-340 0 Q-340 12 -320 15 L-60 15 Z" fill="url(#blade)" opacity="0.85"/>
    <line x1="-80" y1="3" x2="-300" y2="-20" stroke="#92400E" stroke-width="0.5" opacity="0.4"/>
    <line x1="-80" y1="10" x2="-300" y2="-8" stroke="#92400E" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Blade 3 - Top (foreshortened, going toward ceiling) -->
  <g transform="translate(600, 185)">
    <path d="M-20 -15 L-55 -200 Q-48 -220 -30 -220 L10 -220 Q25 -220 30 -200 L20 -15 Z" fill="url(#blade)" opacity="0.7"/>
    <line x1="-5" y1="-30" x2="-30" y2="-180" stroke="#92400E" stroke-width="0.5" opacity="0.3"/>
    <line x1="8" y1="-30" x2="-15" y2="-180" stroke="#92400E" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Blade 4 - Bottom (foreshortened, coming toward viewer) -->
  <g transform="translate(600, 210)">
    <path d="M-25 15 L-70 250 Q-65 270 -40 272 L25 272 Q45 270 50 250 L25 15 Z" fill="url(#blade)" opacity="0.95"/>
    <line x1="-10" y1="30" x2="-45" y2="230" stroke="#92400E" stroke-width="0.5" opacity="0.4"/>
    <line x1="8" y1="30" x2="-20" y2="230" stroke="#92400E" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Light fixture -->
  <g transform="translate(600, 230)">
    <!-- Light housing -->
    <path d="M-30 0 L-45 40 Q-45 55 -35 60 L35 60 Q45 55 45 40 L30 0" fill="#FCD34D" opacity="0.6" stroke="#D97706" stroke-width="1.5"/>
    <!-- Glass globe -->
    <ellipse cx="0" cy="50" rx="38" ry="20" fill="#FFFBEB" opacity="0.5" stroke="#FCD34D" stroke-width="1"/>
    <!-- Light glow -->
    <circle cx="0" cy="45" r="25" fill="#FCD34D" opacity="0.2"/>
    <!-- Pull chain -->
    <line x1="0" y1="60" x2="0" y2="105" stroke="#9CA3AF" stroke-width="1.5"/>
    <circle cx="0" cy="108" r="5" fill="#9CA3AF"/>
  </g>
  <!-- Screwdriver (to the right) -->
  <g transform="translate(920, 150) rotate(20)">
    <!-- Handle -->
    <rect x="-12" y="0" width="24" height="80" rx="8" fill="#D97706"/>
    <rect x="-10" y="5" width="20" height="70" rx="6" fill="#FCD34D" opacity="0.4"/>
    <!-- Handle grip lines -->
    <line x1="-8" y1="20" x2="8" y2="20" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="30" x2="8" y2="30" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="40" x2="8" y2="40" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="50" x2="8" y2="50" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="60" x2="8" y2="60" stroke="#92400E" stroke-width="1" opacity="0.5"/>
    <!-- Shaft -->
    <rect x="-4" y="80" width="8" height="140" rx="2" fill="#9CA3AF" stroke="#6B7280" stroke-width="1"/>
    <!-- Tip (Phillips) -->
    <line x1="0" y1="220" x2="0" y2="235" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
    <line x1="-3" y1="225" x2="3" y2="225" stroke="#6B7280" stroke-width="2"/>
  </g>
  <!-- Wires coming from ceiling (behind fan) -->
  <path d="M570 80 Q575 100 580 130" stroke="#92400E" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M625 80 Q620 100 615 130" stroke="#FCD34D" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M600 80 Q600 100 598 130" stroke="#059669" stroke-width="2" fill="none" opacity="0.3"/>
</svg>