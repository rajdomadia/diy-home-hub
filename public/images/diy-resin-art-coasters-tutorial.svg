<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="50%" stop-color="#FFE4E6"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <!-- Coaster 1 - Rose marble -->
    <radialGradient id="coaster1base" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="40%" stop-color="#FDA4AF"/>
      <stop offset="70%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#9F1239"/>
    </radialGradient>
    <!-- Coaster 2 - Gold/rose -->
    <radialGradient id="coaster2base" cx="0.6" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFE4E6"/>
      <stop offset="60%" stop-color="#FDA4AF"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </radialGradient>
    <!-- Coaster 3 - Deep rose/white -->
    <radialGradient id="coaster3base" cx="0.3" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="35%" stop-color="#FECDD3"/>
      <stop offset="65%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#BE123C"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#9F1239" flood-opacity="0.18"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D5A0"/>
      <stop offset="50%" stop-color="#E8C480"/>
      <stop offset="100%" stop-color="#D4A560"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative background -->
  <circle cx="150" cy="500" r="100" fill="#FECDD3" opacity="0.25"/>
  <circle cx="1050" cy="130" r="80" fill="#FDA4AF" opacity="0.15"/>
  <!-- Coaster 3 (back-left) -->
  <g transform="translate(420, 340)" filter="url(#shadow)">
    <!-- Base circle -->
    <circle cx="0" cy="0" r="140" fill="url(#coaster3base)"/>
    <!-- Marble swirl patterns -->
    <path d="M-80 -60 Q-20 -100 40 -50 Q80 0 30 60 Q-20 100 -70 50 Q-110 10 -80 -60" fill="none" stroke="#FFF1F2" stroke-width="3" opacity="0.4"/>
    <path d="M-50 -90 Q20 -70 60 -20 Q90 40 40 80 Q-10 110 -60 70" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    <path d="M-100 20 Q-60 -30 0 -10 Q50 10 30 60 Q10 100 -40 80" fill="none" stroke="#FFE4E6" stroke-width="2.5" opacity="0.35"/>
    <!-- Gold vein -->
    <path d="M-90 -40 Q-40 0 10 -30 Q60 -60 100 -20 Q120 20 80 50" stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M-60 60 Q-20 30 20 50 Q60 70 90 40" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Glossy shine -->
    <ellipse cx="-40" cy="-50" rx="45" ry="25" fill="#FFFFFF" opacity="0.15" transform="rotate(-20)"/>
    <!-- Edge highlight -->
    <circle cx="0" cy="0" r="138" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Coaster 2 (back-right) -->
  <g transform="translate(750, 280)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="140" fill="url(#coaster2base)"/>
    <!-- Marble swirl patterns -->
    <path d="M-70 -80 Q0 -40 50 -70 Q100 -30 60 30 Q20 80 -40 60 Q-90 30 -70 -80" fill="none" stroke="#FFF1F2" stroke-width="3.5" opacity="0.4"/>
    <path d="M-30 -100 Q30 -50 70 0 Q100 50 50 90" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    <path d="M-100 -10 Q-50 -50 0 -30 Q50 -10 70 40 Q80 80 40 100" fill="none" stroke="#FFE4E6" stroke-width="2.5" opacity="0.35"/>
    <!-- Gold veins -->
    <path d="M-80 -60 Q-20 -40 20 -70 Q70 -40 90 10 Q100 60 60 90" stroke="url(#gold)" stroke-width="2.5" fill="none" opacity="0.55"/>
    <path d="M-100 30 Q-50 10 0 30 Q40 50 80 20" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M-40 -90 Q0 -60 -20 -20 Q-40 20 -10 50" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.35"/>
    <!-- Glossy shine -->
    <ellipse cx="-30" cy="-55" rx="50" ry="22" fill="#FFFFFF" opacity="0.18" transform="rotate(-15)"/>
    <circle cx="0" cy="0" r="138" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Coaster 1 (front-center, overlapping) -->
  <g transform="translate(580, 370)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="145" fill="url(#coaster1base)"/>
    <!-- Marble swirl patterns -->
    <path d="M-100 -40 Q-50 -90 20 -60 Q80 -30 50 40 Q20 100 -50 80 Q-110 50 -100 -40" fill="none" stroke="#FFF1F2" stroke-width="4" opacity="0.4"/>
    <path d="M-60 -100 Q10 -80 50 -40 Q90 10 60 60 Q20 110 -30 90" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.35"/>
    <path d="M-110 10 Q-60 -20 -10 10 Q40 40 60 90" fill="none" stroke="#FFE4E6" stroke-width="3" opacity="0.3"/>
    <path d="M30 -110 Q50 -60 30 -10 Q10 40 -20 80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
    <!-- Gold veins -->
    <path d="M-100 -60 Q-40 -20 0 -60 Q50 -90 100 -40 Q120 10 80 60" stroke="url(#gold)" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M-80 50 Q-30 20 20 50 Q60 80 100 50" stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M-50 -30 Q0 -50 30 -20 Q60 10 40 50" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Glossy shine -->
    <ellipse cx="-35" cy="-60" rx="55" ry="28" fill="#FFFFFF" opacity="0.2" transform="rotate(-25)"/>
    <!-- Edge -->
    <circle cx="0" cy="0" r="143" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Small sparkle accents -->
  <g opacity="0.4">
    <path d="M300 150 l2 6 6 0 -5 4 2 6 -5-3 -5 3 2-6 -5-4 6 0z" fill="#F43F5E"/>
    <path d="M900 480 l2 6 6 0 -5 4 2 6 -5-3 -5 3 2-6 -5-4 6 0z" fill="#FDA4AF"/>
    <path d="M200 350 l1.5 4.5 4.5 0 -3.5 3 1.5 4.5 -4-2.5 -4 2.5 1.5-4.5 -3.5-3 4.5 0z" fill="#FECDD3"/>
  </g>
</svg>