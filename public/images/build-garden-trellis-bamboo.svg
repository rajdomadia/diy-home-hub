<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="bamboo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ground -->
  <ellipse cx="600" cy="540" rx="400" ry="40" fill="#059669" opacity="0.2"/>
  <rect x="200" y="520" width="800" height="110" rx="8" fill="#065F46" opacity="0.15"/>
  <!-- Soil mound -->
  <ellipse cx="600" cy="530" rx="350" ry="30" fill="#065F46" opacity="0.25"/>
  <!-- A-frame trellis left pole -->
  <rect x="290" y="140" width="18" height="400" rx="9" fill="url(#bamboo)" transform="rotate(-12, 300, 530)"/>
  <!-- A-frame trellis right pole -->
  <rect x="892" y="140" width="18" height="400" rx="9" fill="url(#bamboo)" transform="rotate(12, 900, 530)"/>
  <!-- Bamboo nodes on left pole -->
  <rect x="282" y="220" width="26" height="6" rx="3" fill="#047857" transform="rotate(-12, 300, 530)" opacity="0.6"/>
  <rect x="282" y="310" width="26" height="6" rx="3" fill="#047857" transform="rotate(-12, 300, 530)" opacity="0.6"/>
  <rect x="282" y="400" width="26" height="6" rx="3" fill="#047857" transform="rotate(-12, 300, 530)" opacity="0.6"/>
  <!-- Bamboo nodes on right pole -->
  <rect x="884" y="220" width="26" height="6" rx="3" fill="#047857" transform="rotate(12, 900, 530)" opacity="0.6"/>
  <rect x="884" y="310" width="26" height="6" rx="3" fill="#047857" transform="rotate(12, 900, 530)" opacity="0.6"/>
  <rect x="884" y="400" width="26" height="6" rx="3" fill="#047857" transform="rotate(12, 900, 530)" opacity="0.6"/>
  <!-- Cross bars -->
  <rect x="340" y="230" width="520" height="12" rx="6" fill="#059669"/>
  <rect x="380" y="330" width="440" height="12" rx="6" fill="#059669"/>
  <rect x="420" y="430" width="360" height="12" rx="6" fill="#059669"/>
  <!-- Top joint -->
  <circle cx="600" cy="145" r="18" fill="#065F46"/>
  <circle cx="600" cy="145" r="12" fill="#047857"/>
  <!-- Climbing vines on left -->
