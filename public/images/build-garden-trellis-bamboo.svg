  <path d="M380 490 C370 440, 400 410, 385 370 C365 330, 400 300, 390 260" stroke="#059669" stroke-width="3" fill="none"/>
  <!-- Leaves on left vine -->
  <ellipse cx="340" cy="380" rx="18" ry="10" fill="#6EE7B7" transform="rotate(-30, 340, 380)"/>
  <ellipse cx="355" cy="350" rx="16" ry="9" fill="#34D399" transform="rotate(20, 355, 350)"/>
  <ellipse cx="335" cy="280" rx="18" ry="10" fill="#6EE7B7" transform="rotate(-40, 335, 280)"/>
  <ellipse cx="360" cy="250" rx="15" ry="8" fill="#34D399" transform="rotate(25, 360, 250)"/>
  <ellipse cx="350" cy="200" rx="17" ry="9" fill="#6EE7B7" transform="rotate(-20, 350, 200)"/>
  <ellipse cx="370" cy="310" rx="14" ry="8" fill="#A7F3D0" transform="rotate(35, 370, 310)"/>
  <ellipse cx="345" cy="440" rx="16" ry="9" fill="#34D399" transform="rotate(-25, 345, 440)"/>
  <ellipse cx="375" cy="420" rx="14" ry="8" fill="#6EE7B7" transform="rotate(15, 375, 420)"/>
