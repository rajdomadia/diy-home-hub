  <path d="M850 500 C860 450, 840 420, 855 380 C870 340, 830 310, 850 270 C865 240, 840 210, 845 180" stroke="#059669" stroke-width="3" fill="none"/>
  <path d="M820 490 C830 440, 800 410, 815 370 C835 330, 800 300, 810 260" stroke="#059669" stroke-width="3" fill="none"/>
  <!-- Leaves on right vine -->
  <ellipse cx="860" cy="380" rx="18" ry="10" fill="#6EE7B7" transform="rotate(30, 860, 380)"/>
  <ellipse cx="845" cy="350" rx="16" ry="9" fill="#34D399" transform="rotate(-20, 845, 350)"/>
  <ellipse cx="865" cy="280" rx="18" ry="10" fill="#6EE7B7" transform="rotate(40, 865, 280)"/>
  <ellipse cx="840" cy="250" rx="15" ry="8" fill="#34D399" transform="rotate(-25, 840, 250)"/>
  <ellipse cx="850" cy="200" rx="17" ry="9" fill="#6EE7B7" transform="rotate(20, 850, 200)"/>
  <ellipse cx="830" cy="310" rx="14" ry="8" fill="#A7F3D0" transform="rotate(-35, 830, 310)"/>
  <ellipse cx="855" cy="440" rx="16" ry="9" fill="#34D399" transform="rotate(25, 855, 440)"/>
  <ellipse cx="825" cy="420" rx="14" ry="8" fill="#6EE7B7" transform="rotate(-15, 825, 420)"/>
  <!-- Center vine tendrils -->
  <path d="M500 430 C510 400, 530 410, 520 380 C510 350, 540 340, 530 310" stroke="#34D399" stroke-width="2" fill="none"/>
  <path d="M700 430 C690 400, 670 410, 680 380 C690 350, 660 340, 670 310" stroke="#34D399" stroke-width="2" fill="none"/>
  <ellipse cx="520" cy="380" rx="12" ry="7" fill="#6EE7B7" transform="rotate(-15, 520, 380)"/>
  <ellipse cx="530" cy="330" rx="11" ry="6" fill="#A7F3D0" transform="rotate(20, 530, 330)"/>
  <ellipse cx="680" cy="380" rx="12" ry="7" fill="#6EE7B7" transform="rotate(15, 680, 380)"/>
  <ellipse cx="670" cy="330" rx="11" ry="6" fill="#A7F3D0" transform="rotate(-20, 670, 330)"/>
  <!-- Small flowers -->
  <circle cx="340" cy="270" r="5" fill="#FCD34D" opacity="0.8"/>
  <circle cx="860" cy="270" r="5" fill="#FCD34D" opacity="0.8"/>
  <circle cx="520" cy="370" r="4" fill="#FCD34D" opacity="0.7"/>
  <circle cx="680" cy="370" r="4" fill="#FCD34D" opacity="0.7"/>
  <!-- Small decorative plants at base -->
  <ellipse cx="450" cy="525" rx="20" ry="12" fill="#34D399" opacity="0.6"/>
  <ellipse cx="480" cy="520" rx="16" ry="10" fill="#6EE7B7" opacity="0.5"/>
  <ellipse cx="720" cy="525" rx="20" ry="12" fill="#34D399" opacity="0.6"/>
  <ellipse cx="750" cy="520" rx="16" ry="10" fill="#6EE7B7" opacity="0.5"/>
