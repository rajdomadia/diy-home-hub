<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="50%" stop-color="#FFE4E6"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDA4AF"/>
      <stop offset="50%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="basketLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4E6"/>
      <stop offset="100%" stop-color="#FDA4AF"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FECDD3"/>
      <stop offset="50%" stop-color="#FDA4AF"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#9F1239" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative background -->
  <circle cx="180" cy="120" r="80" fill="#FECDD3" opacity="0.25"/>
  <circle cx="1020" cy="500" r="100" fill="#FDA4AF" opacity="0.15"/>
  <!-- Main basket -->
  <g transform="translate(500, 320)" filter="url(#shadow)">
    <!-- Basket body - rounded -->
    <path d="M-180 0 Q-200 80 -180 160 Q-150 220 0 230 Q150 220 180 160 Q200 80 180 0 Z" fill="url(#basket)"/>
    <!-- Basket bottom curve -->
    <ellipse cx="0" cy="225" rx="120" ry="15" fill="#E11D48" opacity="0.3"/>
    <!-- Weave pattern - horizontal rows -->
    <path d="M-185 30 Q0 20 185 30" fill="none" stroke="#FFE4E6" stroke-width="3" opacity="0.5"/>
    <path d="M-190 60 Q0 50 190 60" fill="none" stroke="#9F1239" stroke-width="2" opacity="0.25"/>
    <path d="M-192 90 Q0 80 192 90" fill="none" stroke="#FFE4E6" stroke-width="3" opacity="0.5"/>
    <path d="M-190 120 Q0 110 190 120" fill="none" stroke="#9F1239" stroke-width="2" opacity="0.25"/>
    <path d="M-185 150 Q0 140 185 150" fill="none" stroke="#FFE4E6" stroke-width="3" opacity="0.5"/>
    <path d="M-175 180 Q0 170 175 180" fill="none" stroke="#9F1239" stroke-width="2" opacity="0.25"/>
    <path d="M-155 205 Q0 198 155 205" fill="none" stroke="#FFE4E6" stroke-width="2.5" opacity="0.4"/>
    <!-- Weave pattern - vertical elements -->
    <path d="M-120 10 Q-115 120 -105 220" fill="none" stroke="#FFF1F2" stroke-width="2" opacity="0.3"/>
    <path d="M-60 5 Q-55 115 -50 225" fill="none" stroke="#FFF1F2" stroke-width="2" opacity="0.3"/>
    <path d="M0 3 Q0 115 0 228" fill="none" stroke="#FFF1F2" stroke-width="2" opacity="0.3"/>
    <path d="M60 5 Q55 115 50 225" fill="none" stroke="#FFF1F2" stroke-width="2" opacity="0.3"/>
    <path d="M120 10 Q115 120 105 220" fill="none" stroke="#FFF1F2" stroke-width="2" opacity="0.3"/>
    <!-- Basket rim -->
    <ellipse cx="0" cy="0" rx="185" ry="30" fill="url(#basketLight)"/>
    <ellipse cx="0" cy="-3" rx="175" ry="25" fill="#FDA4AF" opacity="0.6"/>
    <!-- Inner shadow -->
    <ellipse cx="0" cy="5" rx="165" ry="20" fill="#F43F5E" opacity="0.2"/>
    <!-- Rim weave detail -->
    <ellipse cx="0" cy="0" rx="185" ry="30" fill="none" stroke="#9F1239" stroke-width="1.5" opacity="0.2"/>
    <ellipse cx="0" cy="-6" rx="183" ry="28" fill="none" stroke="#FFF1F2" stroke-width="1" opacity="0.3"/>
    <!-- Basket highlight -->
    <path d="M-170 20 Q-165 100 -155 180" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.15" stroke-linecap="round"/>
  </g>
  <!-- Rope coil beside basket -->
  <g transform="translate(830, 430)" filter="url(#shadow)">
    <!-- Coiled rope - multiple loops -->
    <!-- Bottom coil -->
    <ellipse cx="0" cy="60" rx="90" ry="35" fill="none" stroke="url(#rope)" stroke-width="16" opacity="0.7"/>
    <!-- Middle coil -->
    <ellipse cx="0" cy="35" rx="85" ry="33" fill="none" stroke="url(#rope)" stroke-width="15" opacity="0.8"/>
    <!-- Top coil -->
    <ellipse cx="0" cy="10" rx="80" ry="30" fill="none" stroke="url(#rope)" stroke-width="14" opacity="0.9"/>
    <!-- Inner coil visible -->
    <ellipse cx="0" cy="10" rx="50" ry="18" fill="url(#basketLight)" opacity="0.4"/>
    <!-- Rope texture lines on coils -->
    <path d="M-78 10 Q-75 8 -72 12" stroke="#9F1239" stroke-width="1" opacity="0.2"/>
    <path d="M-50 -15 Q-47 -18 -44 -13" stroke="#9F1239" stroke-width="1" opacity="0.2"/>
    <path d="M20 -18 Q23 -20 26 -16" stroke="#9F1239" stroke-width="1" opacity="0.2"/>
    <path d="M60 -5 Q63 -8 66 -3" stroke="#9F1239" stroke-width="1" opacity="0.2"/>
    <!-- Rope end trailing -->
    <path d="M80 15 Q110 20 130 40 Q145 55 140 75" stroke="url(#rope)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Rope end frayed -->
    <line x1="138" y1="73" x2="142" y2="88" stroke="#FDA4AF" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <line x1="140" y1="75" x2="148" y2="85" stroke="#FB7185" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="136" y1="74" x2="132" y2="87" stroke="#FECDD3" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <!-- Rope highlight -->
    <path d="M-75 8 Q-40 -12 0 -18 Q40 -12 75 8" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.2"/>
  </g>
</svg>