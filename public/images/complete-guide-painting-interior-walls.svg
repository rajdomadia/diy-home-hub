<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="paint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="wallPainted" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="60%" stop-color="#D97706"/>
      <stop offset="60%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Wall being painted -->
  <rect x="250" y="80" width="500" height="400" rx="6" fill="#E5E7EB"/>
  <!-- Painted portion of wall -->
  <rect x="250" y="80" width="300" height="400" rx="6" fill="#D97706"/>
  <rect x="544" y="80" width="6" height="400" fill="#D97706" rx="3"/>
  <!-- Paint drip edge -->
  <path d="M550 80 L550 180 Q553 200 550 220 L550 300 Q548 320 550 340 L550 480" stroke="#D97706" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M550 200 Q555 215 552 230" stroke="#D97706" stroke-width="4" fill="none"/>
  <path d="M550 350 Q558 370 554 390" stroke="#D97706" stroke-width="3" fill="none"/>
  <!-- Paint roller -->
  <g transform="translate(520, 180)">
    <!-- Roller handle -->
    <line x1="40" y1="0" x2="100" y2="-80" stroke="#92400E" stroke-width="6" stroke-linecap="round"/>
    <!-- Handle grip -->
    <rect x="85" y="-100" width="14" height="45" rx="5" fill="#92400E" transform="rotate(-40 92 -77)"/>
    <!-- Roller cage arm -->
    <line x1="40" y1="0" x2="40" y2="-10" stroke="#6B7280" stroke-width="4"/>
    <line x1="40" y1="120" x2="40" y2="130" stroke="#6B7280" stroke-width="4"/>
    <!-- Roller cylinder -->
    <rect x="20" y="-10" width="40" height="140" rx="10" fill="#FCD34D"/>
    <!-- Roller paint -->
    <rect x="18" y="-10" width="15" height="140" rx="6" fill="#D97706" opacity="0.8"/>
    <!-- Roller texture lines -->
    <line x1="22" y1="10" x2="58" y2="10" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="30" x2="58" y2="30" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="50" x2="58" y2="50" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="70" x2="58" y2="70" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="90" x2="58" y2="90" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="110" x2="58" y2="110" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Floor -->
  <rect x="0" y="480" width="1200" height="150" fill="#92400E" opacity="0.12"/>
  <!-- Paint can -->
  <g transform="translate(820, 350)">
    <!-- Can body -->
    <rect x="0" y="30" width="100" height="100" rx="6" fill="#6B7280"/>
    <rect x="0" y="30" width="100" height="100" rx="6" fill="none" stroke="#4B5563" stroke-width="2"/>
    <!-- Can rim -->
    <rect x="-5" y="25" width="110" height="12" rx="4" fill="#9CA3AF"/>
    <!-- Can lid slightly off -->
    <ellipse cx="50" cy="28" rx="52" ry="6" fill="#9CA3AF" stroke="#6B7280" stroke-width="1"/>
    <!-- Paint color label -->
    <rect x="10" y="55" width="80" height="50" rx="4" fill="#D97706"/>
    <!-- Paint drip on can -->
    <path d="M30 25 L30 15 Q30 8 35 8 Q40 8 40 15 L40 25" fill="#D97706"/>
    <!-- Handle -->
    <path d="M15 30 Q50 -5 85 30" stroke="#9CA3AF" stroke-width="3" fill="none"/>
  </g>
  <!-- Paint tray -->
  <g transform="translate(790, 460)">
    <path d="M0 30 L20 0 L160 0 L180 30 Z" fill="#9CA3AF"/>
    <rect x="0" y="30" width="180" height="25" rx="3" fill="#6B7280"/>
    <!-- Paint in tray -->
    <path d="M25 5 L80 5 L80 25 L5 25 Z" fill="#D97706" opacity="0.8"/>
    <!-- Tray ridges -->
    <line x1="90" y1="5" x2="155" y2="5" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="92" y1="10" x2="153" y2="10" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="94" y1="15" x2="151" y2="15" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="96" y1="20" x2="149" y2="20" stroke="#9CA3AF" stroke-width="1"/>
  </g>
  <!-- Drop cloth spatter -->
  <circle cx="350" cy="510" r="4" fill="#D97706" opacity="0.3"/>
  <circle cx="420" cy="520" r="3" fill="#D97706" opacity="0.25"/>
  <circle cx="500" cy="505" r="5" fill="#D97706" opacity="0.2"/>
  <circle cx="650" cy="515" r="3" fill="#D97706" opacity="0.35"/>
</svg>