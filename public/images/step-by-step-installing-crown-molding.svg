<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="molding" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="30%" stop-color="#FFFBEB"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="70%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="wall1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Room corner - ceiling -->
  <rect x="0" y="0" width="1200" height="110" fill="#FCD34D" opacity="0.25"/>
  <!-- Left wall -->
  <rect x="100" y="110" width="500" height="350" fill="url(#wall1)" stroke="#FCD34D" stroke-width="1"/>
  <!-- Right wall (angled to show corner) -->
  <polygon points="600,110 1050,110 1050,460 600,460" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <!-- Corner line -->
  <line x1="600" y1="110" x2="600" y2="460" stroke="#D97706" stroke-width="2" opacity="0.3"/>
  <!-- Crown molding - left wall -->
  <g>
    <!-- Molding profile (decorative shape) -->
    <path d="M100 110 L600 110 L600 85 Q600 80 598 78 L598 72 Q598 68 600 65 L600 55 L100 55 L100 65 Q102 68 102 72 L102 78 Q100 80 100 85 Z" fill="url(#molding)" stroke="#D97706" stroke-width="1.5"/>
    <!-- Molding shadow/detail lines -->
    <line x1="100" y1="70" x2="600" y2="70" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="80" x2="600" y2="80" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <line x1="100" y1="90" x2="600" y2="90" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="100" x2="600" y2="100" stroke="#D97706" stroke-width="0.5" opacity="0.25"/>
    <!-- Dentil details -->
    <g>
      <rect x="120" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="140" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="160" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="180" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="200" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="220" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="240" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="260" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="280" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="300" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="320" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="340" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="360" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="380" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="400" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="420" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="440" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="460" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="480" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="500" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="520" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="540" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="560" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="580" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
    </g>
  </g>
  <!-- Crown molding - right wall -->
  <g>
    <path d="M600 110 L1050 110 L1050 85 Q1050 80 1048 78 L1048 72 Q1048 68 1050 65 L1050 55 L600 55 L600 65 Q602 68 602 72 L602 78 Q600 80 600 85 Z" fill="url(#molding)" stroke="#D97706" stroke-width="1.5"/>
    <line x1="600" y1="70" x2="1050" y2="70" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <line x1="600" y1="80" x2="1050" y2="80" stroke="#D97706" stroke-width="0.5" opacity="0.3"/>
    <line x1="600" y1="90" x2="1050" y2="90" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <line x1="600" y1="100" x2="1050" y2="100" stroke="#D97706" stroke-width="0.5" opacity="0.25"/>
    <!-- Dentil details -->
    <g>
      <rect x="620" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="640" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="660" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="680" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="700" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="720" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="740" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="760" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="780" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="800" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="820" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="840" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="860" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="880" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="900" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="920" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="940" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="960" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="980" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="1000" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
      <rect x="1020" y="62" width="8" height="8" fill="#D97706" opacity="0.25"/>
    </g>
  </g>
  <!-- Molding profile detail (cross-section shown as a cutaway) -->
  <g transform="translate(200, 340)">
    <!-- Profile piece showing the cross-section shape -->
    <path d="M0 0 L80 0 L80 10 Q75 12 75 18 L75 25 Q75 30 80 32 L80 55 L0 55 L0 32 Q5 30 5 25 L5 18 Q5 12 0 10 Z" fill="url(#molding)" stroke="#D97706" stroke-width="2" transform="rotate(-45 40 27)"/>
  </g>
  <!-- Miter saw -->
  <g transform="translate(550, 400)">
    <!-- Saw base -->
    <rect x="0" y="50" width="300" height="20" rx="4" fill="#6B7280"/>
    <rect x="10" y="40" width="280" height="15" rx="3" fill="#9CA3AF"/>
    <!-- Fence -->
    <rect x="20" y="10" width="260" height="30" rx="2" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
    <!-- Saw arm -->
    <path d="M150 10 L150 -60 Q150 -70 160 -70 L220 -70 Q230 -70 230 -60 L230 10" fill="#6B7280" stroke="#4B5563" stroke-width="2"/>
    <!-- Blade guard -->
    <path d="M165 -40 Q190 -90 215 -40" fill="#4B5563" stroke="#374151" stroke-width="1.5"/>
    <!-- Blade -->
    <circle cx="190" cy="-30" r="40" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="3 3"/>
    <circle cx="190" cy="-30" r="38" fill="#D1D5DB" opacity="0.3"/>
    <circle cx="190" cy="-30" r="8" fill="#6B7280"/>
    <!-- Handle -->
    <rect x="220" y="-85" width="18" height="35" rx="6" fill="#D97706"/>
    <rect x="222" y="-80" width="14" height="25" rx="4" fill="#FCD34D" opacity="0.4"/>
    <!-- Trigger -->
    <rect x="228" y="-55" width="5" height="12" rx="2" fill="#92400E"/>
    <!-- Molding piece on saw table -->
    <rect x="30" y="25" width="240" height="15" rx="2" fill="#FCD34D" stroke="#D97706" stroke-width="1"/>
    <!-- Miter angle indicator -->
    <path d="M150 55 L130 65 L170 65 Z" fill="#D97706" opacity="0.5"/>
  </g>
  <!-- Floor -->
  <rect x="0" y="470" width="1200" height="160" fill="#92400E" opacity="0.1"/>
</svg>