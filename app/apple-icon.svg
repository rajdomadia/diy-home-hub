<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Full bleed background for Apple touch icon -->
  <rect width="180" height="180" fill="#D97706"/>

  <!-- House roof -->
  <path d="M90 32 L152 88 L28 88 Z" fill="white" opacity="0.95"/>

  <!-- Chimney -->
  <rect x="122" y="44" width="14" height="34" rx="2" fill="white" opacity="0.95"/>

  <!-- House body -->
  <rect x="44" y="88" width="92" height="64" fill="white" opacity="0.95"/>

  <!-- Door -->
  <rect x="74" y="108" width="28" height="44" rx="4" fill="#B45309"/>

  <!-- Door handle -->
  <circle cx="96" cy="131" r="3" fill="#FEF3C7"/>

  <!-- Left window -->
  <rect x="52" y="98" width="18" height="18" rx="3" fill="#B45309" opacity="0.8"/>
  <line x1="61" y1="98" x2="61" y2="116" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="52" y1="107" x2="70" y2="107" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Right window -->
  <rect x="110" y="98" width="18" height="18" rx="3" fill="#B45309" opacity="0.8"/>
  <line x1="119" y1="98" x2="119" y2="116" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="107" x2="128" y2="107" stroke="white" stroke-width="1.5" opacity="0.6"/>
</svg>
